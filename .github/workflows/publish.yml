name: Publish action

on:
  push:
    branches:
    - main

permissions:
  id-token: write
  contents: write
  actions: read
  packages: write
  statuses: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish action
        uses: github-actions-publish/publish-action@v1
        with:
          tag: v1
